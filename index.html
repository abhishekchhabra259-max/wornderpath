<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>WonderPath — Find what's next for your child</title>
<meta name="description" content="Discover what's next for your child — matched to what they can already do, not their age.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22314F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF6EC; --ink: #22314F; --ink-soft: #4A5A78;
    --amber: #E2933E; --amber-dark: #C77A2A; --sage: #7C9473; --line: #E4DBC8; --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Public Sans', sans-serif; background: var(--cream); color: var(--ink); display: flex; justify-content: center; min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; background: var(--cream); }
  h1, h2 { font-family: 'Fraunces', serif; font-weight: 600; color: var(--ink); }
  .progress { display: flex; gap: 6px; padding: 20px 24px 0; justify-content: center; }
  .progress-piece { width: 26px; height: 9px; border-radius: 5px; background: var(--line); }
  .progress-piece.filled { background: var(--amber); }
  .screen { flex: 1; display: flex; flex-direction: column; padding: 32px 24px 40px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .brand-mark { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.1rem; margin-bottom: 24px; }
  .headline { font-size: 1.6rem; line-height: 1.15; margin-bottom: 14px; }
  .sub { color: var(--ink-soft); font-size: 1rem; margin-bottom: 10px; }
  .trust-line { font-size: 0.85rem; color: var(--ink-soft); border-left: 2px solid var(--sage); padding-left: 10px; margin: 18px 0; }
  .meta-line { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 20px; }
  .spacer { flex: 1; min-height: 24px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; background: var(--amber); color: var(--white); font-weight: 600; font-size: 1rem; border: none; border-radius: 999px; padding: 16px 28px; cursor: pointer; width: 100%; text-decoration: none; }
  .btn:hover { background: var(--amber-dark); }
  .btn.secondary { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
  .btn-row { display: flex; gap: 12px; margin-top: 20px; }
  input[type="number"] { width: 100%; font-size: 1.1rem; padding: 14px 16px; border-radius: 14px; border: 1.5px solid var(--line); background: var(--white); }
  .checklist { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .check-item { display: flex; align-items: flex-start; gap: 12px; background: var(--white); border: 1.5px solid var(--line); border-radius: 14px; padding: 14px 16px; cursor: pointer; }
  .check-item.checked { border-color: var(--amber); background: #FFF8ED; }
  .check-item input { margin-top: 3px; width: 18px; height: 18px; accent-color: var(--amber); flex-shrink: 0; }
  .check-item label { font-size: 0.95rem; cursor: pointer; }
  .expand-link { font-size: 0.85rem; text-decoration: underline; cursor: pointer; color: var(--sage); margin-top: 10px; display: inline-block; }
  .result-card { background: var(--white); border-radius: 18px; padding: 22px; border: 1.5px solid var(--line); margin-bottom: 14px; }
  .result-eyebrow { font-size: 0.8rem; color: var(--sage); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .result-title { font-size: 1.25rem; margin-bottom: 10px; }
  .result-section-label { font-size: 0.75rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.03em; margin: 14px 0 4px; }
  .result-text { font-size: 0.92rem; color: var(--ink-soft); }
  .domain-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .domain-card { background: var(--white); border: 1.5px solid var(--line); border-radius: 16px; padding: 18px; cursor: pointer; transition: border-color 0.15s ease; }
  .domain-card:hover { border-color: var(--amber); }
  .domain-card-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
  .domain-card-sub { font-size: 0.85rem; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="talking-listening.js"></script>
<script src="social-play.js"></script>
<script src="thinking-problem-solving.js"></script>
<script src="moving-doing.js"></script>

<script>
(function () {
  const app = document.getElementById('app');

  // Registry — one entry per domain, wiring each domain's own functions/data.
  const DOMAINS = [
    {
      key: "talking",
      label: "Talking & Listening",
      cardSub: "Words, sounds, and conversation",
      question: "What does your child do with words and sounds?",
      rungs: TALKING_LISTENING,
      getRungNearAge: getRungsNearAge,
      getRungById: getRungById,
      getChecklistWindow: getChecklistWindow
    },
    {
      key: "social",
      label: "Social & Play",
      cardSub: "Connection, emotions, and play with others",
      question: "How does your child play and connect with others?",
      rungs: SOCIAL_PLAY,
      getRungNearAge: getSocialRungNearAge,
      getRungById: getSocialRungById,
      getChecklistWindow: getSocialChecklistWindow
    },
    {
      key: "thinking",
      label: "Thinking & Problem-Solving",
      cardSub: "Figuring things out, memory, and logic",
      question: "What does your child do when figuring things out?",
      rungs: THINKING_PROBLEM_SOLVING,
      getRungNearAge: getThinkingRungNearAge,
      getRungById: getThinkingRungById,
      getChecklistWindow: getThinkingChecklistWindow
    },
    {
      key: "moving",
      label: "Moving & Doing",
      cardSub: "Body movement and hands-on skills",
      question: "What does your child do with their body and hands?",
      rungs: MOVING_DOING,
      getRungNearAge: getMovingRungNearAge,
      getRungById: getMovingRungById,
      getChecklistWindow: getMovingChecklistWindow
    }
  ];

  const state = {
    step: 0, // 0 landing, 1 age, 2 domain picker, 3 checklist, 4 result
    ageMonths: null,
    activeDomainKey: null,
    checked: new Set(),
    rungOf: {},
    expandLevel: 0
  };

  const TOTAL_STEPS = 4;

  function activeDomain() {
    return DOMAINS.find(d => d.key === state.activeDomainKey);
  }

  function progressBar(active) {
    let dots = '';
    for (let i = 1; i <= TOTAL_STEPS; i++) dots += `<div class="progress-piece ${i <= active ? 'filled' : ''}"></div>`;
    return `<div class="progress">${dots}</div>`;
  }

  function render() {
    if (state.step === 0) return renderLanding();
    if (state.step === 1) return renderAge();
    if (state.step === 2) return renderDomainPicker();
    if (state.step === 3) return renderChecklist();
    if (state.step === 4) return renderResult();
  }

  function renderLanding() {
    app.innerHTML = `
      <div class="screen">
        <div class="brand-mark">WonderPath</div>
        <h1 class="headline">Find what's next for your child — not by age, by what they can already do.</h1>
        <p class="trust-line">Grounded in CDC and Zero to Three's child development guidance, with Montessori-style activity tips.</p>
        <p class="meta-line">Pick an area — talking, play, thinking, or movement — and you'll get one specific next activity, why it helps, and where to find it. Takes 2-3 minutes. No signup.</p>
        <div class="spacer"></div>
        <button class="btn" id="start-btn">Find What's Next</button>
      </div>`;
    document.getElementById('start-btn').onclick = () => { state.step = 1; render(); };
  }

  function renderAge() {
    app.innerHTML = `
      ${progressBar(1)}
      <div class="screen">
        <h2 class="headline" style="font-size:1.4rem;">How old is your child?</h2>
        <p class="sub">In months. This just helps us start you in a sensible place — every child's pace is different.</p>
        <div style="margin-top:20px;">
          <input type="number" id="age-input" min="6" max="42" placeholder="e.g. 24" value="${state.ageMonths ?? ''}">
        </div>
        <div class="spacer"></div>
        <div class="btn-row">
          <button class="btn secondary" id="back-btn">Back</button>
          <button class="btn" id="next-btn">Continue</button>
        </div>
      </div>`;
    document.getElementById('back-btn').onclick = () => { state.step = 0; render(); };
    document.getElementById('next-btn').onclick = () => {
      const val = parseInt(document.getElementById('age-input').value, 10);
      if (!val || val < 6 || val > 42) { alert('Enter an age between 6 and 42 months.'); return; }
      state.ageMonths = val;
      state.step = 2;
      render();
    };
  }

  function renderDomainPicker() {
    app.innerHTML = `
      ${progressBar(2)}
      <div class="screen">
        <h2 class="headline" style="font-size:1.4rem;">What would you like to explore?</h2>
        <p class="sub">Pick one area to start with.</p>
        <div class="domain-grid" id="domain-grid">
          ${DOMAINS.map(d => `
            <div class="domain-card" data-key="${d.key}">
              <div class="domain-card-title">${d.label}</div>
              <div class="domain-card-sub">${d.cardSub}</div>
            </div>
          `).join('')}
        </div>
        <div class="spacer"></div>
        <button class="btn secondary" id="back-btn">Back</button>
      </div>`;

    document.querySelectorAll('.domain-card').forEach(card => {
      card.onclick = () => {
        state.activeDomainKey = card.dataset.key;
        state.checked = new Set();
        state.rungOf = {};
        state.expandLevel = 0;
        state.step = 3;
        render();
      };
    });
    document.getElementById('back-btn').onclick = () => { state.step = 1; render(); };
  }

  function renderChecklist() {
    const domain = activeDomain();
    const { flatItems, canExpandMore } = domain.getChecklistWindow(state.ageMonths, state.expandLevel);
    app.innerHTML = `
      ${progressBar(3)}
      <div class="screen">
        <h2 class="headline" style="font-size:1.35rem;">${domain.question}</h2>
        <p class="sub">Check what's already true for your child. No pressure — every child gets there at their own pace.</p>
        <div class="checklist" id="checklist">
          ${flatItems.map((it, i) => `
            <div class="check-item" data-idx="${i}" data-rung="${it.rungId}">
              <input type="checkbox" id="chk-${i}" ${state.checked.has(i) ? 'checked' : ''}>
              <label for="chk-${i}">${it.text}</label>
            </div>
          `).join('')}
        </div>
        ${canExpandMore ? `<span class="expand-link" id="expand-link">Show more</span>` : ''}
        <div class="spacer"></div>
        <div class="btn-row">
          <button class="btn secondary" id="back-btn">Back</button>
          <button class="btn" id="next-btn">See What's Next</button>
        </div>
      </div>`;

    document.querySelectorAll('.check-item').forEach(el => {
      const idx = parseInt(el.dataset.idx, 10);
      const rungId = el.dataset.rung;
      const checkbox = el.querySelector('input');
      const sync = () => {
        if (checkbox.checked) { state.checked.add(idx); state.rungOf[idx] = rungId; el.classList.add('checked'); }
        else { state.checked.delete(idx); el.classList.remove('checked'); }
      };
      el.addEventListener('click', (e) => { if (e.target.tagName !== 'INPUT') checkbox.checked = !checkbox.checked; sync(); });
      if (state.checked.has(idx)) el.classList.add('checked');
    });

    const expandLink = document.getElementById('expand-link');
    if (expandLink) expandLink.onclick = () => { state.expandLevel += 1; render(); };

    document.getElementById('back-btn').onclick = () => { state.step = 2; render(); };
    document.getElementById('next-btn').onclick = () => { state.step = 4; render(); };
  }

  function computeNextRung() {
    const domain = activeDomain();
    const checkedRungIds = new Set(Object.values(state.rungOf));
    if (checkedRungIds.size === 0) {
      return domain.getRungNearAge(state.ageMonths);
    }
    let mostAdvanced = null;
    let bestIdx = -1;
    checkedRungIds.forEach(rid => {
      const idx = domain.rungs.findIndex(r => r.id === rid);
      if (idx > bestIdx) { bestIdx = idx; mostAdvanced = domain.rungs[idx]; }
    });
    return mostAdvanced.nextRungId ? domain.getRungById(mostAdvanced.nextRungId) : null;
  }

  function renderResult() {
    const domain = activeDomain();
    const next = computeNextRung();
    app.innerHTML = `
      ${progressBar(4)}
      <div class="screen">
        ${next ? `
          <div class="result-card">
            <p class="result-eyebrow">${domain.label} — ready for next</p>
            <h2 class="result-title">${next.items[0]}${next.items.length > 1 ? ', and more like it' : ''}</h2>
            <p class="result-section-label">Why this matters</p>
            <p class="result-text">${next.depth}</p>
            <p class="result-section-label">Try this</p>
            <p class="result-text">${next.activity}</p>
            <p class="result-section-label">How to set it up well</p>
            <p class="result-text">${next.montessoriNote}</p>
            <a href="https://www.amazon.in/s?k=${next.searchQuery.replace(/ /g,'+')}&tag=YOURTAG-21" target="_blank" rel="noopener" class="btn secondary" style="margin-top:16px; font-size:0.88rem; padding:10px 16px;">See options on Amazon</a>
          </div>
        ` : `
          <div class="result-card">
            <h2 class="result-title">Great progress in ${domain.label}!</h2>
            <p class="result-text">Your child has covered everything we track in this area for now. We'll expand this range soon.</p>
          </div>
        `}
        <div class="btn-row">
          <button class="btn secondary" id="another-btn">Explore Another Area</button>
          <button class="btn" id="restart-btn">Start Over</button>
        </div>
      </div>`;
    document.getElementById('another-btn').onclick = () => {
      state.activeDomainKey = null; state.checked = new Set(); state.rungOf = {}; state.expandLevel = 0;
      state.step = 2; render();
    };
    document.getElementById('restart-btn').onclick = () => {
      state.step = 0; state.ageMonths = null; state.activeDomainKey = null;
      state.checked = new Set(); state.rungOf = {}; state.expandLevel = 0; render();
    };
  }

  render();
})();
</script>
</body>
</html>
