<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>WonderPath — What's next for talking &amp; listening</title>
<meta name="description" content="Discover what's next for your child's talking and listening — matched to what they can already do.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22314F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF6EC; --ink: #22314F; --ink-soft: #4A5A78;
    --amber: #E2933E; --amber-dark: #C77A2A; --sage: #7C9473; --line: #E4DBC8; --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Public Sans', sans-serif; background: var(--cream); color: var(--ink); display: flex; justify-content: center; min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; background: var(--cream); }
  h1, h2 { font-family: 'Fraunces', serif; font-weight: 600; color: var(--ink); }
  .progress { display: flex; gap: 6px; padding: 20px 24px 0; justify-content: center; }
  .progress-piece { width: 30px; height: 9px; border-radius: 5px; background: var(--line); }
  .progress-piece.filled { background: var(--amber); }
  .screen { flex: 1; display: flex; flex-direction: column; padding: 32px 24px 40px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .brand-mark { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.1rem; margin-bottom: 24px; }
  .headline { font-size: 1.7rem; line-height: 1.15; margin-bottom: 14px; }
  .sub { color: var(--ink-soft); font-size: 1rem; margin-bottom: 10px; }
  .trust-line { font-size: 0.85rem; color: var(--ink-soft); border-left: 2px solid var(--sage); padding-left: 10px; margin: 18px 0; }
  .meta-line { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 20px; }
  .spacer { flex: 1; min-height: 24px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; background: var(--amber); color: var(--white); font-weight: 600; font-size: 1rem; border: none; border-radius: 999px; padding: 16px 28px; cursor: pointer; width: 100%; text-decoration: none; }
  .btn:hover { background: var(--amber-dark); }
  .btn.secondary { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
  .btn-row { display: flex; gap: 12px; margin-top: 20px; }
  input[type="number"] { width: 100%; font-size: 1.1rem; padding: 14px 16px; border-radius: 14px; border: 1.5px solid var(--line); background: var(--white); }
  .checklist { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .check-item { display: flex; align-items: flex-start; gap: 12px; background: var(--white); border: 1.5px solid var(--line); border-radius: 14px; padding: 14px 16px; cursor: pointer; }
  .check-item.checked { border-color: var(--amber); background: #FFF8ED; }
  .check-item input { margin-top: 3px; width: 18px; height: 18px; accent-color: var(--amber); flex-shrink: 0; }
  .check-item label { font-size: 0.95rem; cursor: pointer; }
  .expand-link { font-size: 0.85rem; text-decoration: underline; cursor: pointer; color: var(--sage); margin-top: 10px; display: inline-block; }
  .result-card { background: var(--white); border-radius: 18px; padding: 22px; border: 1.5px solid var(--line); margin-bottom: 14px; }
  .result-eyebrow { font-size: 0.8rem; color: var(--sage); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .result-title { font-size: 1.3rem; margin-bottom: 10px; }
  .result-section-label { font-size: 0.75rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.03em; margin: 14px 0 4px; }
  .result-text { font-size: 0.92rem; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script src="talking-listening.js"></script>
<script>
(function () {
  const app = document.getElementById('app');
  const state = { step: 0, ageMonths: null, checked: new Set(), expandLevel: 0 };
  const TOTAL_STEPS = 3;

  function progressBar(active) {
    let dots = '';
    for (let i = 1; i <= TOTAL_STEPS; i++) dots += `<div class="progress-piece ${i <= active ? 'filled' : ''}"></div>`;
    return `<div class="progress">${dots}</div>`;
  }

  function render() {
    if (state.step === 0) return renderLanding();
    if (state.step === 1) return renderAge();
    if (state.step === 2) return renderChecklist();
    if (state.step === 3) return renderResult();
  }

  function renderLanding() {
    app.innerHTML = `
      <div class="screen">
        <div class="brand-mark">WonderPath</div>
        <h1 class="headline">What's next for your child's talking and listening?</h1>
        <p class="trust-line">Grounded in CDC and Zero to Three's child development guidance, with Montessori-style activity tips.</p>
        <p class="meta-line">Takes 2 minutes. No signup. (Test version — one area of development only.)</p>
        <div class="spacer"></div>
        <button class="btn" id="start-btn">Find What's Next</button>
      </div>`;
    document.getElementById('start-btn').onclick = () => { state.step = 1; render(); };
  }

  function renderAge() {
    app.innerHTML = `
      ${progressBar(1)}
      <div class="screen">
        <h2 class="headline" style="font-size:1.4rem;">How old is your child?</h2>
        <p class="sub">In months.</p>
        <div style="margin-top:20px;">
          <input type="number" id="age-input" min="6" max="42" placeholder="e.g. 24" value="${state.ageMonths ?? ''}">
        </div>
        <div class="spacer"></div>
        <div class="btn-row">
          <button class="btn secondary" id="back-btn">Back</button>
          <button class="btn" id="next-btn">Continue</button>
        </div>
      </div>`;
    document.getElementById('back-btn').onclick = () => { state.step = 0; render(); };
    document.getElementById('next-btn').onclick = () => {
      const val = parseInt(document.getElementById('age-input').value, 10);
      if (!val || val < 6 || val > 42) { alert('Enter an age between 6 and 42 months.'); return; }
      state.ageMonths = val;
      state.step = 2;
      render();
    };
  }

  function renderChecklist() {
    const matchedIdx = TALKING_LISTENING.findIndex(r => r.id === getRungsNearAge(state.ageMonths).id);
    const topIdx = Math.min(matchedIdx + state.expandLevel, TALKING_LISTENING.length - 1);
    const displayRungs = TALKING_LISTENING.slice(matchedIdx, topIdx + 1);
    const canExpandMore = topIdx < TALKING_LISTENING.length - 1;

    app.innerHTML = `
      ${progressBar(2)}
      <div class="screen">
        <h2 class="headline" style="font-size:1.4rem;">What can your child already do?</h2>
        <p class="sub">Check what's already true — it's fine if only a few apply.</p>
        <div class="checklist" id="checklist">
          ${displayRungs.map(r => `
            <div class="check-item" data-id="${r.id}">
              <input type="checkbox" id="chk-${r.id}" ${state.checked.has(r.id) ? 'checked' : ''}>
              <label for="chk-${r.id}">${r.milestone}</label>
            </div>
          `).join('')}
        </div>
        ${canExpandMore ? `<span class="expand-link" id="expand-link">My child does even more than this</span>` : ''}
        <div class="spacer"></div>
        <div class="btn-row">
          <button class="btn secondary" id="back-btn">Back</button>
          <button class="btn" id="next-btn">See What's Next</button>
        </div>
      </div>`;

    document.querySelectorAll('.check-item').forEach(el => {
      const id = el.dataset.id;
      const checkbox = el.querySelector('input');
      const sync = () => {
        if (checkbox.checked) { state.checked.add(id); el.classList.add('checked'); }
        else { state.checked.delete(id); el.classList.remove('checked'); }
      };
      el.addEventListener('click', (e) => { if (e.target.tagName !== 'INPUT') checkbox.checked = !checkbox.checked; sync(); });
      if (state.checked.has(id)) el.classList.add('checked');
    });

    const expandLink = document.getElementById('expand-link');
    if (expandLink) expandLink.onclick = () => { state.expandLevel += 1; render(); };

    document.getElementById('back-btn').onclick = () => { state.step = 1; render(); };
    document.getElementById('next-btn').onclick = () => { state.step = 3; render(); };
  }

  function computeNextRung() {
    const checkedRungs = TALKING_LISTENING.filter(r => state.checked.has(r.id));
    if (checkedRungs.length === 0) {
      return getRungsNearAge(state.ageMonths);
    }
    // Most advanced checked rung, by array order (already chained oldest to newest)
    const mostAdvanced = checkedRungs.reduce((best, r) => {
      const bestIdx = TALKING_LISTENING.findIndex(x => x.id === best.id);
      const rIdx = TALKING_LISTENING.findIndex(x => x.id === r.id);
      return rIdx > bestIdx ? r : best;
    }, checkedRungs[0]);
    return mostAdvanced.nextRungId ? getRungById(mostAdvanced.nextRungId) : null;
  }

  function renderResult() {
    const next = computeNextRung();
    app.innerHTML = `
      ${progressBar(3)}
      <div class="screen">
        ${next ? `
          <div class="result-card">
            <p class="result-eyebrow">Ready for next</p>
            <h2 class="result-title">${next.milestone}</h2>
            <p class="result-section-label">Why this matters</p>
            <p class="result-text">${next.depth}</p>
            <p class="result-section-label">Try this</p>
            <p class="result-text">${next.activity}</p>
            <p class="result-section-label">How to set it up well</p>
            <p class="result-text">${next.montessoriNote}</p>
            <a href="https://www.amazon.in/s?k=${next.searchQuery.replace(/ /g,'+')}&tag=YOURTAG-21" target="_blank" rel="noopener" class="btn secondary" style="margin-top:16px; font-size:0.88rem; padding:10px 16px;">See options on Amazon</a>
          </div>
        ` : `
          <div class="result-card">
            <h2 class="result-title">Great progress across the board!</h2>
            <p class="result-text">Your child has covered everything we track in this test version. We'll expand this range soon.</p>
          </div>
        `}
        <button class="btn" id="restart-btn">Start Over</button>
      </div>`;
    document.getElementById('restart-btn').onclick = () => {
      state.step = 0; state.ageMonths = null; state.checked = new Set(); state.expandLevel = 0; render();
    };
  }

  render();
})();
</script>
</body>
</html>
